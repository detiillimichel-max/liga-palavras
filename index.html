<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trilha Mágica</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="hud">
    <span>🏁 <b id="fase">1</b>/20</span>
    <span>⭐ <b id="pts">0</b></span>
    <span>🪙 <b id="moedas">0</b></span>
    <span id="vidas">❤️❤️❤️</span>
  </div>
  <h1>TRILHA MÁGICA</h1>
</header>
<main>
  <div style="position:relative;margin-top:28px">
    <div class="tema-nome" id="tema">Floresta</div>
    <div id="tabuleiro"></div>
  </div>
  <div class="botoes">
    <button id="rolar">🎲 ROLAR DADO</button>
    <button id="loja">🛒 LOJA</button>
  </div>
  <div id="msg">Toque em ROLAR para começar!</div>
</main>

<div id="fork" class="modal hidden"><div class="box">
  <h2>🔀 BIFURCAÇÃO!</h2>
  <button id="atalho">⚡ ATALHO (+3)</button>
  <button id="seguro">🛡️ SEGURO (+15)</button>
</div></div>

<div id="lojaM" class="modal hidden"><div class="box">
  <h2>🛒 LOJA</h2>
  <p>Estrelas: <b id="ptsLoja">0</b></p>
  <button data-i="1">🎲 Dado Extra - 20⭐</button>
  <button data-i="2">🛡️ Escudo - 25⭐</button>
  <button data-i="3">🚀 Turbo - 15⭐</button>
  <button data-i="4">💖 Vida - 40⭐</button>
  <button data-i="5">🍀 Trevo - 18⭐</button>
  <button id="fechaL" class="sec">Fechar</button>
</div></div>

<div id="fim" class="modal hidden"><div class="box">
  <h2 id="fimT">🏆 FASE COMPLETA!</h2>
  <p id="fimP"></p>
  <button id="prox">PRÓXIMA →</button>
</div></div>

<script src="script.js"></script>
</body>
</html>
