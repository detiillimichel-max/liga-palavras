 meadow:"linear-gradient(180deg,#16a34a 0%,#14532d 100%)",
 reef:"linear-gradient(180deg,#0891b2 0%,#164e63 100%)",
 mist:"linear-gradient(180deg,#475569 0%,#0f172a 100%)",
 savanna:"linear-gradient(180deg,#ca8a04 0%,#422006 100%)",
 dunes:"linear-gradient(180deg,#d97706 0%,#78350f 100%)",
 tropics:"linear-gradient(180deg,#0d9488 0%,#134e4a 100%)",
 zen:"linear-gradient(180deg,#6d28d9 0%,#2e1065 100%)",
 cliff:"linear-gradient(180deg,#57534e 0%,#1c1917 100%)",
 pond:"linear-gradient(180deg,#0e7490 0%,#083344 100%)",
 cave:"linear-gradient(180deg,#292524 0%,#0c0a09 100%)",
 valley:"linear-gradient(180deg,#4d7c0f 0%,#1a2e05 100%)",
 dawn:"linear-gradient(180deg,#f97316 0%,#7c2d12 70%,#1c0703 100%)",
};

const $ = s=>document.querySelector(s);
const board = $('#board'), wheel = $('#wheel'), trail = $('#trail');
const currEl = $('#currentWord'), coinsEl = $('#coins'), levelEl = $('#levelNum');
const hintBtn = $('#hint'), shuffleBtn = $('#shuffle'), clearBtn = $('#clear');
const toast = $('#toast'), modal = $('#modal'), nextBtn = $('#nextBtn'), bg = $('#bg');

let level=1, coins=200, found={}, currentData, letters=[], solutions=[], foundSet=new Set();
let isDown=false, path=[], currentWord='', points=[];

const audio = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d=0.08,t='sine',v=0.18){ if(audio.state==='suspended')audio.resume(); const o=audio.createOscillator(),g=audio.createGain(); o.type=t; o.frequency.value=f; g.gain.value=v; o.connect(g); g.connect(audio.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001,audio.currentTime+d); o.stop(audio.currentTime+d); }
const sounds={ok:()=>{tone(660,0.07);setTimeout(()=>tone(880,0.08),70)},bad:()=>tone(220,0.12,'sawtooth',0.12),bonus:()=>{tone(900,0.06);setTimeout(()=>tone(1200,0.06),70)},click:()=>tone(500,0.03),hint:()=>{tone(700,0.08);setTimeout(()=>tone(1000,0.1),90)}};

function load(){
  try{const d=JSON.parse(localStorage.getItem('ptwords')||'{}'); level=d.level||1; coins=d.coins??200; found=d.found||{}}catch{}
}
function save(){ localStorage.setItem('ptwords', JSON.stringify({level,coins,found})) }

function shuffle(a){ const arr=[...a]; for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]} return arr }

function showToast(msg){ toast.textContent=msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),1400) }

function setTheme(t){ bg.style.background = THEMES[t]||THEMES.aurora }

function canForm(word, lettersArr){
  const cp=[...lettersArr]; for(const ch of word){ const i=cp.indexOf(ch); if(i===-1) return false; cp.splice(i,1) } return true
}

function getLevelData(n){
  if(n<=LEVELS.length) return structuredClone(LEVELS[n-1]);
  // procedural
  const base = shuffle([...DICT].filter(w=>w.length>=4 && w.length<=6))[0];
  let ltrs = shuffle(base.split('')).slice(0,6);
  while(ltrs.length<5) ltrs.push('AEOSR'[Math.floor(Math.random()*5)]);
  const cands = [...DICT].filter(w=>w.length>=3 && w.length<=6 && canForm(w,ltrs)).sort(()=>Math.random()-0.5).slice(0,10);
  if(!cands.includes(base)) cands[0]=base;
  return {l:ltrs.join(''), w:[...new Set(cands)], t:Object.keys(THEMES)[Math.floor(Math.random()*Object.keys(THEMES).length)]}
}

function renderLevel(){
  currentData = getLevelData(level);
  letters = shuffle(currentData.l.split(''));
  solutions = [...new Set(currentData.w.map(w=>w.toUpperCase()))];
  foundSet = new Set(found[level]||[]);
  levelEl.textContent = level;
  coinsEl.textContent = coins;
  setTheme(currentData.t);
  hintBtn.classList.toggle('disabled', coins<20);

  // board
  board.innerHTML='';
  const sorted = [...solutions].sort((a,b)=> b.length!==a.length? b.length-a.length : a.localeCompare(b));
  sorted.forEach(w=>{
    const row=document.createElement('div'); row.className='word'; row.dataset.word=w;
    for(const ch of w){ const t=document.createElement('div'); t.className='tile'; t.innerHTML=`<span>${ch}</span>`; const s=t.querySelector('span'); s.style.opacity='0'; row.appendChild(t) }
    board.appendChild(row);
    if(foundSet.has(w)) fillRow(row,w,true);
  });

  // wheel
  wheel.innerHTML=''; trail.innerHTML='';
  const n=letters.length, R= wheel.clientWidth/2 - 38;
  const cx=wheel.clientWidth/2, cy=wheel.clientHeight/2;
  letters.forEach((ch,i)=>{
    const ang = -Math.PI/2 + (i*2*Math.PI/n);
    const x = cx + Math.cos(ang)*R, y = cy + Math.sin(ang)*R;
    const el=document.createElement('div'); el.className='letter'; el.textContent=ch; el.dataset.l=ch; el.dataset.i=i;
    el.style.left=x+'px'; el.style.top=y+'px';
    wheel.appendChild(el);
  });
}

function fillRow(row, word, instant){
  [...row.children].forEach((tile,i)=>{
    tile.classList.add('filled');
    const sp=tile.querySelector('span'); sp.textContent=word[i]; sp.style.opacity='1';
    if(!instant){ tile.style.animation='none'; void tile.offsetWidth; tile.style.animation='pop .35s cubic-bezier(.2,1.5,.5,1)' }
  })
}

function getPos(el){ const r=el.getBoundingClientRect(), pr=trail.getBoundingClientRect(); return {x:r.left+r.width/2-pr.left, y:r.top+r.height/2-pr.top} }

function updateTrail(){
  trail.innerHTML='';
  if(points.length===0) return;
  const poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  poly.setAttribute('points', points.map(p=>`${p.x},${p.y}`).join(' '));
  poly.setAttribute('fill','none'); poly.setAttribute('stroke','rgba(124,58,237,.95)'); poly.setAttribute('stroke-width','10');
  poly.setAttribute('stroke-linecap','round'); poly.setAttribute('stroke-linejoin','round');
  poly.setAttribute('filter','drop-shadow(0 4px 8px rgba(124,58,237,.5))');
  trail.appendChild(poly);
  points.forEach(p=>{ const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r','16'); c.setAttribute('fill','#7c3aed'); trail.appendChild(c) })
}

function showCurrent(w){ currEl.textContent=w; currEl.classList.add('show') }
function hideCurrent(){ currEl.classList.remove('show') }

function startDrag(target,e){
  isDown=true; path=[target]; currentWord=target.dataset.l; target.classList.add('active');
  points=[getPos(target)]; updateTrail(); showCurrent(currentWord); sounds.click();
  wheel.setPointerCapture?.(e.pointerId);
}
function moveDrag(e){
  if(!isDown) return;
  const el=document.elementFromPoint(e.clientX, e.clientY)?.closest('.letter');
  if(el && !path.includes(el)){
    path.push(el); currentWord+=el.dataset.l; el.classList.add('active');
    points.push(getPos(el)); updateTrail(); showCurrent(currentWord); tone(420+path.length*40,0.025,'sine',0.08);
  }
  // follow last point for line
  if(points.length){
    const pr=trail.getBoundingClientRect(); const x=e.clientX-pr.left, y=e.clientY-pr.top;
    const temp=[...points,{x,y}]; trail.innerHTML=''; const poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    poly.setAttribute('points', temp.map(p=>`${p.x},${p.y}`).join(' ')); poly.setAttribute('fill','none');
    poly.setAttribute('stroke','rgba(124,58,237,.6)'); poly.setAttribute('stroke-width','10'); poly.setAttribute('stroke-linecap','round');
    trail.appendChild(poly); points.slice(0,-1).forEach(p=>{ const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r','16'); c.setAttribute('fill','#7c3aed'); trail.appendChild(c) })
  }
}
function endDrag(){ if(!isDown) return; isDown=false; path.forEach(p=>p.classList.remove('active')); trail.innerHTML=''; points=[]; hideCurrent(); checkWord(currentWord); currentWord=''; path=[] }

wheel.addEventListener('pointerdown',e=>{ const t=e.target.closest('.letter'); if(t) startDrag(t,e) });
window.addEventListener('pointermove',moveDrag);
window.addEventListener('pointerup',endDrag);
window.addEventListener('pointercancel',endDrag);

function checkWord(w){
  if(!w || w.length<2) return;
  w=w.toUpperCase();
  if(foundSet.has(w)){ currEl.classList.add('shake'); setTimeout(()=>currEl.classList.remove('shake'),400); sounds.bad(); showToast('Já encontrada'); return }
  if(solutions.includes(w)){
    foundSet.add(w); found[level]=[...foundSet]; const row=[...board.children].find(r=>r.dataset.word===w); if(row) fillRow(row,w);
    const gain=Math.max(5, w.length*3); coins+=gain; coinsEl.textContent=coins; sounds.ok(); showToast(`+${gain}`); save(); checkComplete();
  } else if(DICT.has(w) && w.length>=3){
    if(!foundSet.has('BONUS:'+w)){ foundSet.add('BONUS:'+w); coins+=5; coinsEl.textContent=coins; sounds.bonus(); showToast('Palavra extra +5'); save(); hintBtn.classList.toggle('disabled', coins<20) }
    else { sounds.bad(); showToast('Já usada') }
  } else { sounds.bad(); currEl.classList.add('shake'); setTimeout(()=>currEl.classList.remove('shake'),400); showToast('Não encontrada') }
}

function checkComplete(){
  const all = solutions.every(w=>foundSet.has(w));
  if(all){ setTimeout(()=>{ coins+=50; coinsEl.textContent=coins; save(); modal.classList.remove('hidden') },600) }
}

hintBtn.addEventListener('click',()=>{
  if(coins<20) return;
  const incomplete = solutions.filter(w=>!foundSet.has(w));
  if(!incomplete.length) return;
  coins-=20; coinsEl.textContent=coins; sounds.hint(); hintBtn.classList.toggle('disabled', coins<20);
  const word = incomplete[Math.floor(Math.random()*incomplete.length)];
  const row=[...board.children].find(r=>r.dataset.word===word);
  const tiles=[...row.children].filter(t=>!t.classList.contains('filled'));
  if(tiles.length){ const t=tiles[Math.floor(Math.random()*tiles.length)]; const idx=[...row.children].indexOf(t);
    t.classList.add('filled','hint'); t.querySelector('span').textContent=word[idx]; t.querySelector('span').style.opacity='1';
    setTimeout(()=>t.classList.remove('hint'),1000);
    // if whole word revealed by hints, mark found
    if([...row.children].every(c=>c.classList.contains('filled'))){ foundSet.add(word); found[level]=[...foundSet]; save(); checkComplete() }
  }
  save()
});

shuffleBtn.addEventListener('click',()=>{
  sounds.click(); letters=shuffle(letters); const nodes=[...wheel.querySelectorAll('.letter')];
  const n=letters.length, R=wheel.clientWidth/2-38, cx=wheel.clientWidth/2, cy=wheel.clientHeight/2;
  nodes.forEach((el,i)=>{ el.dataset.l=letters[i]; el.textContent=letters[i]; const ang=-Math.PI/2 + (i*2*Math.PI/n); const x=cx+Math.cos(ang)*R, y=cy+Math.sin(ang)*R; el.style.transition='left .35s cubic-bezier(.2,1.2,.3,1), top .35s'; el.style.left=x+'px'; el.style.top=y+'px' })
});

clearBtn.addEventListener('click',()=>{ endDrag() });

nextBtn.addEventListener('click',()=>{ modal.classList.add('hidden'); level++; save(); renderLevel() });

load(); renderLevel();

// prevent scroll
document.addEventListener('touchmove', e=>{ if(isDown) e.preventDefault() }, {passive:false});
})();
</script>
